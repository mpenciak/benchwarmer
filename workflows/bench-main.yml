name: Benchmark (Main)

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    # Only run on pushes to the default branch
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install lakeprof
        run: |
          uv tool install --from git+https://github.com/Kha/lakeprof lakeprof

      - name: Run benchmark
        env:
          BENCH_AUTH_TOKEN: ${{ secrets.BENCH_AUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUNNER_SRC="${{ vars.BENCHWARMER_RUNNER_PATH || 'runner' }}"
          bash "$RUNNER_SRC/bench.sh" \
            "${{ vars.BENCH_LIBRARY_NAME }}" \
            "${{ secrets.BENCH_API_ENDPOINT }}"
